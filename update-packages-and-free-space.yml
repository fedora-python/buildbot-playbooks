- name: Pre-update boot cleanup
  become: true
  hosts: buildbots

  tasks:
    - name: Remove duplicate rescue kernels from /boot
      shell: |
        rescue_kernels=$(ls -t /boot/vmlinuz-0-rescue-* 2>/dev/null)
        count=$(echo "$rescue_kernels" | grep -c . 2>/dev/null || echo 0)
        if [ "$count" -le 1 ]; then
          echo "No duplicate rescue kernels"
          exit 0
        fi
        echo "$rescue_kernels" | tail -n +2 | while read -r kernel; do
          machine_id=$(echo "$kernel" | sed 's|/boot/vmlinuz-0-rescue-||')
          echo "Removing rescue pair for: $machine_id"
          rm -f "/boot/vmlinuz-0-rescue-${machine_id}"
          rm -f "/boot/initramfs-0-rescue-${machine_id}.img"
        done
      register: rescue_cleanup
      changed_when: "'Removing' in rescue_cleanup.stdout"
      failed_when: false

    - name: Remove kdump images for non-running kernels
      shell: |
        running=$(uname -r)
        removed=0
        for f in /boot/vmlinuz-*-kdump /boot/initramfs-*-kdump.img; do
          [ -e "$f" ] || continue
          kver=$(basename "$f" | sed -E 's/^(vmlinuz|initramfs)-//; s/(-kdump\.img|-kdump)$//')
          if [ "$kver" != "$running" ]; then
            echo "Removing: $f"
            rm -f "$f"
            removed=$((removed + 1))
          fi
        done
        echo "Removed $removed kdump file(s)"
      register: kdump_cleanup
      changed_when: "'Removing:' in kdump_cleanup.stdout"
      failed_when: false

- name: Install packages, reboot and clean cache
  become: true
  hosts: buildbots

  tasks:
    - name: Update all packages
      package:
        name: '*'
        state: latest

    - name: check if reboot is needed
      command: "dnf needs-restarting -r -s"
      register: needs_restarting
      changed_when: needs_restarting.rc == 1
      failed_when: false
      notify: Reboot after update

    - name: Clean the dnf cache
      command: dnf clean all
      changed_when: false

  handlers:
    - name: Reboot after update
      reboot:

- name: Remove old kernels beyond installonly_limit
  become: true
  hosts: buildbots

  tasks:
    - name: Remove old kernels if beyond installonly_limit
      shell: |
        limit=$(grep -oE 'installonly_limit=[0-9]+' /etc/dnf/dnf.conf 2>/dev/null | cut -d= -f2)
        limit=${limit:-3}
        running=$(uname -r)
        kernels=$(rpm -q kernel-core --queryformat '%{INSTALLTIME} %{VERSION}-%{RELEASE}.%{ARCH}\n' 2>/dev/null | sort -n | awk '{print $2}')
        count=$(echo "$kernels" | grep -c . 2>/dev/null || echo 0)
        if [ "$count" -le "$limit" ]; then
          echo "Only $count kernel(s) installed, limit is $limit, nothing to remove"
          exit 0
        fi
        to_remove=$(echo "$kernels" | head -n -${limit})
        for kver in $to_remove; do
          if [ "$kver" = "$running" ]; then
            echo "Skipping running kernel: $kver"
            continue
          fi
          echo "Removing kernel: $kver"
          dnf remove -y kernel-core-${kver} 2>/dev/null || rpm -e kernel-core-${kver} 2>/dev/null || true
        done
      register: kernel_cleanup
      changed_when: "'Removing kernel' in kernel_cleanup.stdout"
      failed_when: false

- name: Clean the systemd logs
  gather_facts: no
  hosts: buildbots
  become: true

  tasks:
    - name: clean logs older than 30 days
      command: journalctl --vacuum-time=30d
      changed_when: False

- name: Clean disk space
  gather_facts: no
  hosts: buildbots
  become: true

  tasks:
    - name: Discover buildbot worker service name
      shell: systemctl list-units --type=service --all --plain --no-legend 'buildbot-worker@*.service' | awk '{print $1}' | head -1
      register: worker_service
      changed_when: false

    - name: Discover worker buildarea path
      shell: systemctl show -p WorkingDirectory "{{ worker_service.stdout }}" | cut -d= -f2
      register: worker_path
      changed_when: false
      when: worker_service.stdout | length > 0

    - name: Stop the buildbot worker service
      service:
        name: "{{ worker_service.stdout }}"
        state: stopped
      when: worker_service.stdout | length > 0

    - name: Remove old build directories and rotated logs
      shell: |
        cd "{{ worker_path.stdout }}" && \
        rm -rf 3.* pull_request* custom* twistd.log.*
      register: cleanup_result
      changed_when: cleanup_result.rc == 0
      when: worker_path.stdout is defined and worker_path.stdout | length > 0

    - name: Start again the buildbot worker service
      service:
        name: "{{ worker_service.stdout }}"
        state: started
      when: worker_service.stdout | length > 0
